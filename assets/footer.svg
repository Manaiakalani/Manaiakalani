<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 854 140" width="100%" role="img" aria-label="Mahalo — made with aloha in the PNW">
  <defs>
    <linearGradient id="fbg" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0d1117;#0d1117" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f6feb">
        <animate attributeName="stop-color"
                 values="#1f6feb;#2ea043;#a371f7;#1f6feb"
                 dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="fglow" cx="15%" cy="65%" r="55%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#58a6ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="frule" x1="0%" x2="100%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="fshimmer" x1="0%" x2="100%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="854" height="140" fill="url(#fbg)"/>
  <rect width="854" height="140" fill="url(#fglow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- top divider rule grows from center -->
  <line x1="427" y1="32" x2="427" y2="32" stroke="url(#frule)" stroke-width="2">
    <animate attributeName="x1" from="427" to="347" dur="0.9s" begin="0.4s" fill="freeze"/>
    <animate attributeName="x2" from="427" to="507" dur="0.9s" begin="0.4s" fill="freeze"/>
  </line>

  <!-- signature -->
  <text x="427" y="70" text-anchor="middle" fill="#ffffff"
        font-size="22" font-weight="600" letter-spacing="-0.3"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
        opacity="0">
    Mahalo for stopping by 🌺
    <animate attributeName="opacity" from="0" to="1" dur="1.0s" begin="0.6s" fill="freeze"/>
  </text>

  <text x="427" y="98" text-anchor="middle" fill="#c9d1d9"
        font-size="12" font-weight="500" letter-spacing="2"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
        opacity="0">
    BUILT WITH ALOHA  •  REDMOND, WA
    <animate attributeName="opacity" from="0" to="1" dur="1.0s" begin="1.0s" fill="freeze"/>
  </text>

  <!-- shimmer line that sweeps across, mirroring the header's vibe -->
  <rect x="-300" y="118" width="300" height="1.2" fill="url(#fshimmer)" opacity="0.7">
    <animate attributeName="x" from="-300" to="854" dur="6s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
</svg>
