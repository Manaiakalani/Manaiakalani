<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 854 200" width="100%" role="img" aria-label="Maximilian (Manaiakalani) Stein — Product Manager • Microsoft">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#0d1117;#0d1117" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="55%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f6feb">
        <animate attributeName="stop-color"
                 values="#1f6feb;#2ea043;#a371f7;#1f6feb"
                 dur="18s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <radialGradient id="glow" cx="85%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#58a6ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="rule" x1="0%" x2="100%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="854" height="200" rx="16" ry="16" fill="url(#bg)"/>
  <rect width="854" height="200" rx="16" ry="16" fill="url(#glow)">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- name: fade + slight rise on load -->
  <text x="427" y="92" text-anchor="middle" fill="#ffffff"
        font-size="38" font-weight="700" letter-spacing="-0.5"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
        opacity="0">
    Maximilian (Manaiakalani) Stein
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" begin="0.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate"
                      from="0 8" to="0 0" dur="1.1s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- center rule: width grows from 0 -->
  <line x1="427" y1="115" x2="427" y2="115" stroke="url(#rule)" stroke-width="2">
    <animate attributeName="x1" from="427" to="347" dur="0.9s" begin="0.7s" fill="freeze"/>
    <animate attributeName="x2" from="427" to="507" dur="0.9s" begin="0.7s" fill="freeze"/>
  </line>

  <text x="427" y="146" text-anchor="middle" fill="#c9d1d9"
        font-size="16" font-weight="500" letter-spacing="1.5"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
        opacity="0">
    PRODUCT MANAGER  •  MICROSOFT
    <animate attributeName="opacity" from="0" to="1" dur="1.0s" begin="1.0s" fill="freeze"/>
  </text>
</svg>
