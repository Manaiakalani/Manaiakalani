<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 854 200" width="100%" role="img" aria-label="Maximilian Stein — Product Manager • Microsoft">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="55%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#58a6ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0%" x2="100%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#58a6ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="854" height="200" fill="url(#bg)"/>
  <rect width="854" height="200" fill="url(#glow)"/>

  <text x="427" y="92" text-anchor="middle" fill="#ffffff"
        font-size="46" font-weight="700" letter-spacing="-0.5"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">Maximilian Stein</text>

  <line x1="347" y1="115" x2="507" y2="115" stroke="url(#rule)" stroke-width="2"/>

  <text x="427" y="146" text-anchor="middle" fill="#c9d1d9"
        font-size="18" font-weight="500" letter-spacing="2"
        font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif">PRODUCT MANAGER  •  MICROSOFT</text>
</svg>
